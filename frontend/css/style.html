<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

:root{
  --cream: #F5EDE3;
  --sky:   #B8CCCC;
  --rug:   #8FB5A8;
  --cover: #5C7E7E;
  --desk:  #E8B882;
  --eraser:#D4907F;
  --blush: #C96B5A;
  --dark:  #2E3030;
  --mid:   #5A4A42;
  --muted: #8C7A70;
  --white: #FFFFFF;
}

body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:200;
  background:rgba(245,237,227,0.93);
  backdrop-filter:blur(14px);
  padding:0 56px;height:66px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(143,181,168,0.35);
}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-img{
  width:44px;
  height:44px;
  border-radius:50%;
  object-fit: cover;
  border: 2px solid var(--rug);
  box-shadow: 0 4px 10px rgba(92,126,126,0.15);
}
.logo-hindi{
  font-family:'Tiro Devanagari Hindi',serif;
  font-size:28px;font-weight:700;
  color:var(--cover);letter-spacing:1px;
  line-height:1;
}
.logo-eng{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--eraser);
  margin-top:2px;display:block;
}
.logo-stack{display:flex;flex-direction:column;justify-content:center}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{
  text-decoration:none;font-size:14px;font-weight:500;
  color:var(--mid);transition:color .2s;letter-spacing:.3px;
}
.nav-links a:hover{color:var(--cover)}
.btn-nav{
  background:var(--cover);color:#fff;
  border:none;padding:10px 24px;border-radius:50px;
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:.5px;
  transition:background .2s,transform .15s;
}
.btn-nav:hover{background:#4e6e6e;transform:scale(1.02)}

/* ── HERO ── */
.hero{
  min-height:90vh;
  display:flex;align-items:center;
  padding:60px 56px 50px;
  position:relative;overflow:hidden;
}
.blob{position:absolute;border-radius:50%;pointer-events:none}
.blob-1{width:520px;height:520px;top:-100px;right:-80px;
  background:radial-gradient(circle,rgba(184,204,204,.38) 0%,transparent 68%)}
.blob-2{width:380px;height:380px;bottom:-80px;left:-60px;
  background:radial-gradient(circle,rgba(212,144,127,.28) 0%,transparent 68%)}
.blob-3{width:280px;height:280px;top:40%;left:40%;
  background:radial-gradient(circle,rgba(232,184,130,.18) 0%,transparent 70%)}

.hero-inner{
  display:flex;justify-content:center;
  max-width:880px;width:100%;margin:0 auto;
  align-items:center;position:relative;z-index:2;text-align:center;
}
.hero-inner .hero-desc{margin-left:auto;margin-right:auto}
.hero-inner .hero-actions{justify-content:center}
.hero-inner .hero-stats{justify-content:center}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(143,181,168,.2);
  border:1px solid rgba(143,181,168,.5);
  color:var(--cover);
  font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  padding:6px 14px;border-radius:50px;margin-bottom:22px;
}
.eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--rug);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.hero-kicker{
  font-size:13px;font-weight:600;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--rug);margin-bottom:14px;
}
.hero-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(44px,5.2vw,68px);font-weight:700;line-height:1.08;
  color:var(--dark);margin-bottom:8px;
}
.hero-title em{font-style:italic;color:var(--cover)}
.hero-title .pop{color:var(--eraser)}

.hero-desc{
  font-size:16.5px;line-height:1.78;color:var(--mid);
  max-width:460px;margin:18px 0 38px;font-weight:400;
}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap}
.btn-primary{
  background:var(--cover);color:#fff;
  border:none;padding:15px 34px;border-radius:50px;
  font-size:15px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .2s;letter-spacing:.4px;
}
.btn-primary:hover{background:#4e6e6e;transform:translateY(-2px)}
.btn-outline{
  background:transparent;color:var(--cover);
  border:2px solid var(--rug);padding:14px 32px;border-radius:50px;
  font-size:15px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .2s;
}
.btn-outline:hover{background:rgba(143,181,168,.12)}

.hero-stats{
  display:flex;gap:36px;margin-top:48px;
  padding-top:32px;border-top:1px solid rgba(143,181,168,.3);
}
.stat-num{
  font-family:'Cormorant Garamond',serif;
  font-size:30px;font-weight:700;color:var(--cover);
}
.stat-label{font-size:12px;color:var(--muted);margin-top:2px;font-weight:400}

/* ── MASCOT COLUMN ── */
.mascot-container {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 1200px;
  width: 100%;
}
.hero-mascot {
  max-width: 100%;
  height: auto;
  max-height: 520px;
  filter: drop-shadow(0px 24px 38px rgba(92,126,126,0.22));
  animation: floatMascot 6s ease-in-out infinite;
  transform-style: preserve-3d;
  opacity: 0;
  transition: opacity 0.4s ease;
}

@keyframes floatMascot {
  0%, 100% { transform: translateY(0px) rotateY(-4deg) rotateX(1deg); }
  50% { transform: translateY(-15px) rotateY(4deg) rotateX(-1deg); }
}

/* ── TRUST BAR ── */
.trust-bar{
  background:#fff;
  padding:22px 56px;
  border-top:1px solid rgba(143,181,168,.2);
  border-bottom:1px solid rgba(143,181,168,.2);
  display:flex;align-items:center;justify-content:center;gap:64px;
  flex-wrap:wrap;
}
.trust-item{
  display:flex;align-items:center;gap:10px;
  font-size:13px;color:var(--mid);font-weight:500;
}
.trust-item svg{opacity:.6}

/* ── FEATURES ── */
.features{padding:100px 56px;max-width:1120px;margin:0 auto}
.sec-head{text-align:center;margin-bottom:64px}
.sec-eye{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--rug);margin-bottom:14px}
.sec-title{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;font-weight:700;color:var(--dark);line-height:1.18;
}
.sec-title em{font-style:italic;color:var(--eraser)}

.feat-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:22px;
}
.feat-card{
  background:#fff;border-radius:22px;padding:34px 26px;
  border:1px solid rgba(143,181,168,.22);
  transition:transform .22s,box-shadow .22s;position:relative;overflow:hidden;
}
.feat-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:22px 22px 0 0;
}
.fc1::after{background:var(--rug)}
.fc2::after{background:var(--eraser)}
.fc3::after{background:var(--desk)}
.fc4::after{background:var(--sky)}
.fc5::after{background:var(--cover)}
.fc6::after{background:var(--blush)}
.feat-card:hover{transform:translateY(-5px);box-shadow:0 18px 44px rgba(92,126,126,.13)}
.feat-ico{
  width:54px;height:54px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;margin-bottom:18px;
}
.fc1 .feat-ico{background:rgba(143,181,168,.18)}
.fc2 .feat-ico{background:rgba(212,144,127,.18)}
.fc3 .feat-ico{background:rgba(232,184,130,.22)}
.fc4 .feat-ico{background:rgba(184,204,204,.28)}
.fc5 .feat-ico{background:rgba(92,126,126,.1)}
.fc6 .feat-ico{background:rgba(201,107,90,.12)}
.feat-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:700;color:var(--dark);margin-bottom:9px;
}
.feat-desc{font-size:14px;line-height:1.72;color:var(--mid)}

/* ── REAL DATA SECTION ── */
.data-section{
  background:var(--cover);padding:90px 56px;
  position:relative;overflow:hidden;
}
.data-section::before{
  content:'';position:absolute;top:-80px;right:-80px;
  width:340px;height:340px;
  background:rgba(255,255,255,.06);border-radius:50%;
}
.data-inner{
  max-width:1120px;margin:0 auto;
  display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start;
}
.data-text{color:#fff}
.data-eye{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:16px}
.data-title{
  font-family:'Cormorant Garamond',serif;
  font-size:40px;font-weight:700;line-height:1.18;margin-bottom:18px;
}
.data-title em{font-style:italic;color:var(--desk)}
.data-desc{font-size:15.5px;line-height:1.75;color:rgba(255,255,255,.82);margin-bottom:30px}
.data-metrics{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:30px}
.metric-box{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:14px;padding:16px 18px;
}
.metric-val{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;font-weight:700;color:#fff;
}
.metric-lbl{font-size:12px;color:rgba(255,255,255,.6);margin-top:3px;text-transform:uppercase;letter-spacing:1px}
.data-btn{
  background:var(--desk);color:#5a3d1e;
  border:none;padding:14px 28px;border-radius:50px;
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .2s;
}
.data-btn:hover{background:#dba970;transform:translateY(-1px)}

/* risk table */
.risk-table-wrap{display:flex;flex-direction:column;gap:13px}
.risk-row{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  border-radius:14px;padding:15px 18px;
  display:flex;align-items:flex-start;gap:14px;
}
.risk-dot{
  width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:3px;
}
.risk-dot.g{background:#6fcf97;box-shadow:0 0 0 4px rgba(111,207,151,.22)}
.risk-dot.a{background:var(--desk);box-shadow:0 0 0 4px rgba(232,184,130,.22)}
.risk-dot.r{background:#EB5757;box-shadow:0 0 0 4px rgba(235,87,87,.22)}
.risk-name{font-size:14px;font-weight:600;color:#fff}
.risk-vitals{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px;line-height:1.5}
.risk-tag{
  margin-left:auto;flex-shrink:0;
  font-size:11px;font-weight:600;letter-spacing:.5px;
  padding:4px 11px;border-radius:50px;text-transform:uppercase;
}
.tag-g{background:rgba(111,207,151,.2);color:#6fcf97}
.tag-a{background:rgba(232,184,130,.2);color:var(--desk)}
.tag-r{background:rgba(235,87,87,.2);color:#EB5757}

/* ── HOW IT WORKS ── */
.how-section{background:#fff;padding:100px 56px}
.how-inner{max-width:1120px;margin:0 auto}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:60px;position:relative}
.steps::before{
  content:'';position:absolute;top:27px;left:12.5%;right:12.5%;
  height:2px;
  background:linear-gradient(90deg,var(--sky),var(--rug),var(--eraser),var(--blush));
  z-index:0;border-radius:2px;
}
.step{text-align:center;padding:0 14px;position:relative;z-index:1}
.step-circle{
  width:54px;height:54px;border-radius:50%;
  margin:0 auto 18px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;border:2px solid;background:#fff;
}
.step:nth-child(1) .step-circle{border-color:var(--sky)}
.step:nth-child(2) .step-circle{border-color:var(--rug)}
.step:nth-child(3) .step-circle{border-color:var(--desk)}
.step:nth-child(4) .step-circle{border-color:var(--eraser)}
.step-title{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-weight:700;color:var(--dark);margin-bottom:7px;
}
.step-desc{font-size:13px;color:var(--mid);line-height:1.65}

/* ── LANGUAGE ── */
.lang-section{padding:90px 56px;max-width:1120px;margin:0 auto;text-align:center}
.lang-pills{display:flex;flex-wrap:wrap;gap:11px;justify-content:center;margin-top:36px}
.pill{
  background:#fff;border:1.5px solid rgba(143,181,168,.4);
  border-radius:50px;padding:10px 22px;
  font-size:14px;font-weight:500;color:var(--cover);
  transition:all .2s;cursor:default;
}
.pill:hover{background:rgba(143,181,168,.1);border-color:var(--rug)}
.pill.active{background:var(--rug);color:#fff;border-color:var(--rug)}

/* ── CTA ── */
.cta-section{
  padding:110px 56px;text-align:center;
  position:relative;overflow:hidden;
}
.cta-section::before{
  content:'';position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:640px;height:640px;
  background:radial-gradient(circle,rgba(212,144,127,.15) 0%,transparent 65%);
  border-radius:50%;pointer-events:none;
}
.cta-inner{position:relative;z-index:1;max-width:580px;margin:0 auto}
.cta-title{
  font-family:'Cormorant Garamond',serif;
  font-size:50px;font-weight:700;line-height:1.1;
  color:var(--dark);margin-bottom:18px;
}
.cta-title em{font-style:italic;color:var(--cover)}
.cta-desc{font-size:16px;color:var(--mid);line-height:1.75;margin-bottom:40px}
.cta-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.cta-note{margin-top:22px;font-size:12px;color:var(--muted)}

/* ── FOOTER ── */
footer{
  padding:36px 56px;
  border-top:1px solid rgba(143,181,168,.25);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
}
.footer-logo-hindi{
  font-family:'Tiro Devanagari Hindi',serif;
  font-size:22px;font-weight:700;color:var(--cover);
}
.footer-note{font-size:12px;color:var(--muted)}
.footer-links{display:flex;gap:20px}
.footer-links a{font-size:12px;color:var(--muted);text-decoration:none}
.footer-links a:hover{color:var(--cover)}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  nav{padding:0 24px}
  .hero{padding:40px 24px}
  .hero-inner{grid-template-columns:1fr;gap:48px}
  
  .feat-grid{grid-template-columns:1fr 1fr}
  .data-inner{grid-template-columns:1fr}
  .steps{grid-template-columns:1fr 1fr;gap:32px}
  .steps::before{display:none}
  footer{flex-direction:column;text-align:center}
  .trust-bar{gap:28px}
  .features,.data-section,.how-section,.lang-section,.cta-section{padding:72px 24px}
}
@media(max-width:600px){
  .feat-grid{grid-template-columns:1fr}
  .steps{grid-template-columns:1fr}
  .hero-title{font-size:38px}
  .nav-links{display:none}
  .data-metrics{grid-template-columns:1fr}
}
</style>
